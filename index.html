<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观影记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #000;
            --surface: #111;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #f0f0f0;
            --text-secondary: #666;
            --accent: #e94560;
            --accent-dim: rgba(233, 69, 96, 0.15);
            color-scheme: dark;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Top Bar (A24 Minimal Header) ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .top-bar-left { display: flex; align-items: center; gap: 2rem; }
        .top-bar-logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text);
            cursor: default;
        }
        .top-bar-stats {
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
        .top-bar-stats span { color: var(--text); font-weight: 500; }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .top-bar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .top-bar-btn:hover {
            border-color: var(--text);
            color: var(--text);
            background: var(--surface);
        }
        .top-bar-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        .top-bar-add {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.03em;
        }
        .top-bar-add:hover {
            background: #ff3b6f;
            transform: translateY(-1px);
        }

        /* ===== Filter Panel (Dropdown from top) ===== */
        .filter-panel {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 490;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .filter-panel.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }
        .filter-panel-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 140px;
        }
        .filter-group-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .chip {
            padding: 0.35rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chip:hover { border-color: var(--text-secondary); color: var(--text); }
        .chip.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }
        .filter-search {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0 1rem;
            gap: 0.5rem;
            min-width: 220px;
        }
        .filter-search input {
            flex: 1;
            background: none;
            border: none;
            padding: 0.6rem 0;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
        }
        .filter-search input::placeholder { color: var(--text-secondary); }
        .filter-search svg { color: var(--text-secondary); flex-shrink: 0; }
        .filter-sort select {
            padding: 0.6rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .filter-reset {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-reset:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .filter-network {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #10b981;
            margin-left: auto;
        }
        .filter-network a { color: #10b981; text-decoration: none; }
        .filter-network a:hover { text-decoration: underline; }

        /* ===== Main Content ===== */
        .main-content {
            padding: 80px 2rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== Stats Bar (Minimal) ===== */
        .stats-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .stats-bar-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .stats-bar-item .num {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }
        .stats-bar-item .num.accent { color: var(--accent); }

        /* ===== Movie Grid (Full-width, A24 style) ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .movie-card {
            position: relative;
            cursor: pointer;
            background: var(--surface);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: cardIn 0.4s ease forwards;
            border-radius: 0;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .movie-card .poster-wrap {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
            background: var(--surface);
        }
        .movie-card .poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }
        .movie-card:hover .poster-wrap img { transform: scale(1.05); }

        .movie-card .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            gap: 0.5rem;
        }
        .movie-card .poster-placeholder .icon {
            font-size: 2rem;
            opacity: 0.3;
        }
        .movie-card .poster-placeholder .initial {
            font-size: 2.5rem;
            font-weight: 700;
            color: rgba(233, 69, 96, 0.2);
        }

        /* Rating badge - top right */
        .movie-card .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 2;
            border-radius: 0;
            letter-spacing: 0.05em;
        }

        /* Hover overlay - card info */
        .movie-card .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 0.8rem 0.8rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: 2;
        }
        .movie-card:hover .card-overlay { opacity: 1; }
        .card-overlay .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
            color: white;
        }
        .card-overlay .card-meta {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .card-overlay .card-meta .platform-tag {
            padding: 0.1rem 0.4rem;
            background: rgba(255,255,255,0.1);
            font-size: 0.65rem;
        }

        .type-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            z-index: 2;
        }

        /* ===== Load More ===== */
        .load-area {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 0;
        }
        .load-area p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .load-area .loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Loading Dialog ===== */
        .loading-dialog-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .loading-dialog-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .loading-dialog {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            min-width: 200px;
        }
        .loading-dialog .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-dialog .hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .batch-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.3rem;
        }
        .batch-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .batch-progress-stats {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ===== Skeleton ===== */
        .skeleton-card {
            background: var(--surface);
            overflow: hidden;
        }
        .skeleton-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--surface);
            position: relative;
            overflow: hidden;
        }
        .skeleton-poster::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: skeletonShine 1.6s ease-in-out infinite;
        }
        @keyframes skeletonShine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        /* ===== Empty State ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--surface);
            max-width: 720px;
            width: 92%;
            max-height: 88vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--border); }

        .modal-header {
            position: relative;
            padding: 2rem 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px; height: 36px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { border-color: var(--accent); color: var(--accent); }
        .modal-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
        .modal-alt-title { font-size: 0.85rem; color: var(--text-secondary); }
        .modal-body { padding: 2rem; }

        .modal-poster { width: 180px; flex-shrink: 0; }
        .modal-poster img { width: 100%; display: block; }
        @media (max-width: 600px) { .modal-poster { width: 120px; } }

        .detail-row { display: flex; margin-bottom: 1.2rem; align-items: flex-start; }
        .detail-label {
            width: 80px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .detail-value { flex: 1; font-size: 0.9rem; color: var(--text); }
        .rating-stars { display: flex; gap: 0.2rem; }
        .star {
            width: 20px; height: 20px;
            background: rgba(233, 69, 96, 0.15);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .star.filled { background: var(--accent); }

        .notes-section {
            margin-top: 1.5rem;
            padding: 1rem 1.2rem;
            background: var(--accent-dim);
            border-left: 2px solid var(--accent);
        }
        .notes-section h4 { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase; }
        .notes-text { font-size: 0.9rem; color: var(--text-secondary); font-style: italic; line-height: 1.6; }

        .modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; border-top: 1px solid var(--border); padding-top: 1.5rem; }
        .action-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 0;
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .action-btn:hover { border-color: var(--text); }
        .action-btn.edit:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.delete:hover { border-color: #ef4444; color: #ef4444; }

        .douban-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(6, 179, 54, 0.1);
            border: 1px solid rgba(6, 179, 54, 0.3);
            color: #10b981;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .douban-link:hover { background: rgba(6, 179, 54, 0.2); }

        /* ===== Add Modal (same style) ===== */
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-select {
            background: var(--surface);
            cursor: pointer;
        }
        .form-select option {
            background: var(--surface);
            color: var(--text);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-section { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .form-section-title { font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-bottom: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }

        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            padding: 0.4rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            min-height: 40px;
        }
        .tag-input-container:focus-within { border-color: var(--accent); }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.5rem;
            background: var(--accent-dim);
            font-size: 0.75rem;
            color: var(--text);
        }
        .tag-item .remove-tag { cursor: pointer; opacity: 0.6; }
        .tag-item .remove-tag:hover { opacity: 1; }
        .tag-input {
            flex: 1;
            min-width: 80px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            padding: 0.2rem;
            outline: none;
            font-family: inherit;
        }

        .save-btn {
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .save-btn:hover { background: #ff3b6f; }

        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-top: 2px;
            max-height: 360px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .search-suggestions.show { display: block; }
        .suggestion-item {
            display: flex;
            gap: 0.8rem;
            padding: 0.6rem 0.7rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(255,255,255,0.04); }
        .suggestion-poster {
            width: 52px; height: 72px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 3px;
        }
        .suggestion-info { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .suggestion-title { font-weight: 500; font-size: 0.85rem; }
        .suggestion-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.15rem; }
        .suggestion-meta .sep { margin: 0 0.3rem; opacity: 0.3; }
        .suggestion-country { font-size: 0.7rem; color: var(--text-secondary); opacity: 0.65; margin-top: 0.1rem; }
        .suggestion-rating { color: var(--accent); font-weight: 500; }

        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.8rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .notification.show { opacity: 1; transform: translateY(0); }
        .notification.success { border-color: #10b981; color: #10b981; }
        .notification.error { border-color: #ef4444; color: #ef4444; }

        /* ===== Pagination ===== */
        .pagination {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            padding: 3rem 0 1rem;
        }
        .pagination .page-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 0.6rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

            <div class="spinner" id="batchSpinner"></div>
            <div class="hint" id="batchProgressHint">正在批量填充...</div>
            <div class="batch-progress-bar">
                <div class="batch-progress-fill" id="batchProgressFill"></div>
            </div>
            <div class="batch-progress-stats" id="batchProgressStats"></div>
        </div>

    <script>
        const API_BASE = `${window.location.origin}/api`;

        let movies = [];
        let pagination = { page: 1, per_page: 21, total: 0, total_pages: 0 };
        let filters = { search: '', type: [], year: [], platform: [], country: [] };
        let editingId = null;
        let searchTimeout = null;
        let isLoading = false;
        let posterFetched = false;
        let filterOpen = false;

        function proxyImg(movie) {
            if (!movie) return '';
            if (movie.has_poster_data) return `/api/movies/poster/${movie.id}/image`;
            if (!movie.poster || movie.poster === '_not_found_') return '';
            if (movie.poster.includes('doubanio.com') || movie.poster.includes('douban.com')) {
                return `/api/proxy/image?url=${encodeURIComponent(movie.poster)}`;
            }
            return movie.poster;
        }

        async function apiGet(url) {
            try {
                const ctrl = new AbortController();
                const t = setTimeout(() => ctrl.abort(), 8000);
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(t);
                if (res.ok) return await res.json();
            } catch (e) { console.error('API Error:', e); }
            return { success: false };
        }

        async function apiFetch(url, opts) {
            try {
                const ctrl = new AbortController();
                const timeout = opts?.timeout || 8000;
                const t = setTimeout(() => ctrl.abort(), timeout);
                const res = await fetch(url, { ...opts, signal: ctrl.signal });
                clearTimeout(t);
                return await res.json();
            } catch (e) { 
                console.error('API Error:', e);
                return { success: false, message: '网络错误' }; }
        }

        async function fetchStats() {
            const d = await apiGet(`${API_BASE}/movies/stats`);
            if (d.success && d.data) {
                const s = d.data;
                document.getElementById('totalCount').textContent = s.total || 0;
                document.getElementById('avgRating').textContent = s.avgRating || 0;
                document.getElementById('movieCount').textContent = s.movieCount || 0;
                document.getElementById('seriesCount').textContent = s.seriesCount || 0;

                const yearFilter = document.getElementById('yearFilter');
                if (s.years && s.years.length > 0) {
                    yearFilter.innerHTML = '';
                    const allChip = document.createElement('span');
                    allChip.className = 'chip active';
                    allChip.dataset.value = 'all';
                    allChip.textContent = '全部';
                    allChip.addEventListener('click', () => {
                        document.querySelectorAll('#yearFilter .chip').forEach(x => x.classList.remove('active'));
                        allChip.classList.add('active');
                        filters.year = [];
                        applyFilters();
                    });
                    yearFilter.appendChild(allChip);
                    
                    s.years.forEach(y => {
                        const chip = document.createElement('span');
                        chip.className = 'chip';
                        chip.dataset.value = y.year;
                        chip.textContent = y.year;
                        chip.addEventListener('click', () => {
                            allChip.classList.remove('active');
                            if (chip.classList.contains('active')) {
                                chip.classList.remove('active');
                                filters.year = filters.year.filter(v => v !== String(y.year));
                            } else {
                                chip.classList.add('active');
                                filters.year.push(String(y.year));
                            }
                            if (filters.year.length === 0) {
                                allChip.classList.add('active');
                            }
                            applyFilters();
                        });
                        yearFilter.appendChild(chip);
                    });
                }
            }
        }

        async function fetchCountries() {
            const d = await apiGet(`${API_BASE}/movies/countries`);
            if (d.success && d.data) {
                const countryFilter = document.getElementById('countryFilter');
                countryFilter.innerHTML = '';
                
                const allChip = document.createElement('span');
                allChip.className = 'chip active';
                allChip.dataset.value = 'all';
                allChip.textContent = '全部';
                allChip.addEventListener('click', () => {
                    document.querySelectorAll('#countryFilter .chip').forEach(x => x.classList.remove('active'));
                    allChip.classList.add('active');
                    filters.country = [];
                    applyFilters();
                });
                countryFilter.appendChild(allChip);
                
                d.data.forEach(country => {
                    const chip = document.createElement('span');
                    chip.className = 'chip';
                    chip.dataset.value = country;
                    chip.textContent = country;
                    chip.addEventListener('click', () => {
                        allChip.classList.remove('active');
                        if (chip.classList.contains('active')) {
                            chip.classList.remove('active');
                            filters.country = filters.country.filter(v => v !== country);
                        } else {
                            chip.classList.add('active');
                            filters.country.push(country);
                        }
                        if (filters.country.length === 0) {
                            allChip.classList.add('active');
                        }
                        applyFilters();
                    });
                    countryFilter.appendChild(chip);
                });
            }
        }

        async function loadNetworkInfo() {
            try {
                const d = await apiGet(`${API_BASE}/network/info`);
                if (d.success && d.data) {
                    document.getElementById('networkUrl').innerHTML =
                        `<a href="${d.data.networkUrl}" target="_blank">${d.data.networkUrl}</a>`;
                }
            } catch (e) {
                document.getElementById('networkUrl').textContent = '获取失败';
            }
        }

        async function applyFilters() {
            pagination.page = 1;
            movies = [];
            await fetchMovies();
            renderMovies();
        }

        async function fetchMovies() {
            if (isLoading) return;
            isLoading = true;
            const params = new URLSearchParams();
            if (filters.search) params.set('search', filters.search);
            params.set('type', filters.type);
            params.set('year', filters.year);
            params.set('platform', filters.platform);
            params.set('country', filters.country);
            params.set('sort', document.getElementById('sortSelect').value);
            params.set('page', pagination.page);
            params.set('per_page', pagination.per_page);
            try {
                const data = await apiGet(`${API_BASE}/movies?${params}`);
                if (data.success) {
                    movies = data.data;
                    pagination.total = data.total;
                    pagination.total_pages = data.total_pages;
                    pagination.page = data.page;
                } else {
                    document.getElementById('movieGrid').innerHTML =
                        '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败</p></div>';
                }
            } finally { isLoading = false; }
        }

        async function goToPage(page) {
            if (isLoading || page < 1 || page > pagination.total_pages) return;
            pagination.page = page;
            await fetchMovies();
            renderMovies();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            if (pagination.total_pages <= 1) return '';

            const total = pagination.total_pages;
            const current = pagination.page;
            let pages = [];

            // Always show first page
            pages.push(1);

            // Calculate range around current page
            let start = Math.max(2, current - 1);
            let end = Math.min(total - 1, current + 1);

            // Adjust for edge cases
            if (current <= 3) { start = 2; end = Math.min(4, total - 1); }
            if (current >= total - 2) { start = Math.max(total - 3, 2); end = total - 1; }

            // Add ellipsis before range if needed
            if (start > 2) pages.push('...');

            // Add middle pages
            for (let i = start; i <= end; i++) pages.push(i);

            // Add ellipsis after range if needed
            if (end < total - 1) pages.push('...');

            // Always show last page
            if (total > 1) pages.push(total);

            let html = '';

            // Prev button
            html += `<button class="page-btn" onclick="goToPage(${current - 1})" ${current <= 1 ? 'disabled' : ''}> ‹ </button>`;

            for (const p of pages) {
                if (p === '...') {
                    html += `<span class="page-ellipsis">···</span>`;
                } else {
                    html += `<button class="page-btn${p === current ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                }
            }

            // Next button
            html += `<button class="page-btn" onclick="goToPage(${current + 1})" ${current >= total ? 'disabled' : ''}> › </button>`;

            return `<div class="pagination">${html}</div>`;
        }

        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            document.getElementById('filteredCount').textContent = pagination.total;

            if (movies.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><p>没有找到匹配的影片</p></div>';
                return;
            }

            let html = movies.map((movie, i) => `
                <div class="movie-card" style="animation-delay:${i*0.04}s" onclick="openModal(${movie.id})">
                    <div class="poster-wrap">
                        ${(movie.has_poster_data || movie.poster) ? `
                            <img src="${proxyImg(movie)}" alt="${movie.title}" loading="lazy"
                                onerror="this.outerHTML=\`<div class=\\'poster-placeholder\\'><span class=\\'icon\\'>🎬</span><span class=\\'initial\\'>${(movie.title||'?')[0]}</span></div>\`">
                        ` : `
                            <div class="poster-placeholder">
                                <span class="icon">🎬</span>
                                <span class="initial">${(movie.title||'?')[0]}</span>
                            </div>
                        `}
                        <span class="rating-badge">${Number(movie.rating||0).toFixed(1)}</span>
                        <span class="type-tag">${movie.type||'未知'}</span>
                        <div class="card-overlay">
                            <div class="card-title">${movie.title}</div>
                            <div class="card-meta">
                                <span>${movie.year||'未知'}</span>
                                <span class="platform-tag">${movie.platform}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            html += renderPagination();
            grid.innerHTML = html;
        }

        async function openModal(id) {
            // 确保 ID 类型一致
            let movie = movies.find(m => String(m.id) === String(id));
            if (!movie) return;
            posterFetched = false;
            if (!movie.has_poster_data) {
                posterFetched = true;
                try {
                    await apiFetch(`${API_BASE}/movies/fetch-poster/${id}`, { method: 'POST' });
                    const single = await apiGet(`${API_BASE}/movies/${id}`);
                    if (single.success && single.data) {
                        const idx = movies.findIndex(m => String(m.id) === String(id));
                        if (idx !== -1) movies[idx] = single.data;
                        movie = single.data;
                    } else {
                        movie = movies.find(m => String(m.id) === String(id));
                    }
                    if (!movie) return;
                } catch (e) {
                    console.error('自动获取海报失败:', e);
                }
            }

            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalAltTitle').textContent = movie.altTitle || '';

            const rating = Number(movie.rating || 0);
            const stars = Array(10).fill(0).map((_, i) =>
                `<div class="star ${i < Math.floor(rating) ? 'filled' : ''}"></div>`
            ).join('');
            const category = movie.category ? movie.category.split(/[,，、]/).map(t => `<span class="movie-tag" style="padding:0.2rem 0.5rem;background:var(--accent-dim);font-size:0.75rem;color:var(--text)">${t.trim()}</span>`).join('') : '';
            const notesHTML = movie.notes ? `
                <div class="notes-section"><h4>备注</h4><p class="notes-text">"${movie.notes}"</p></div>
            ` : '';
            const posterHTML = (movie.has_poster_data || movie.poster)
                ? `<div class="modal-poster"><img src="${proxyImg(movie)}" alt="${movie.title}" onerror="this.parentElement.innerHTML=''"></div>`
                : '';
            const tmdbLink = movie.tmdbUrl ? `
                <a href="${movie.tmdbUrl}" target="_blank" class="douban-link" onclick="event.stopPropagation();">
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                    TMDB
                </a>
            ` : '';

            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
                    ${posterHTML}
                    <div style="flex:1;min-width:200px">
                        <div class="detail-row"><div class="detail-label">评分</div><div class="detail-value"><div style="display:flex;align-items:center;gap:0.8rem"><div class="rating-stars">${stars}</div><span style="font-weight:600;color:var(--accent)">${rating.toFixed(1)}</span></div></div></div>
                        <div class="detail-row"><div class="detail-label">年份</div><div class="detail-value">${movie.year||'未知'}</div></div>
                        <div class="detail-row"><div class="detail-label">类型</div><div class="detail-value">${movie.type||'未知'}</div></div>
                        <div class="detail-row"><div class="detail-label">地区</div><div class="detail-value">${movie.country||'未知'}</div></div>
                        <div class="detail-row"><div class="detail-label">平台</div><div class="detail-value">${movie.platform}</div></div>
                        <div class="detail-row"><div class="detail-label">分类</div><div class="detail-value"><div style="display:flex;flex-wrap:wrap;gap:0.4rem">${category||'<span style="color:var(--text-secondary)">无</span>'}</div></div></div>
                        <div class="detail-row"><div class="detail-label">归档</div><div class="detail-value">${movie.archiveDate}</div></div>
                        ${notesHTML}
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="action-btn edit" onclick="event.stopPropagation();event.preventDefault();editMovie(${movie.id})">✏️ 编辑</button>
                    <button class="action-btn delete" onclick="event.stopPropagation();event.preventDefault();deleteMovie(${movie.id})">🗑️ 删除</button>
                </div>
                ${tmdbLink}
            `;

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            if (posterFetched) { posterFetched = false; applyFilters(); }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('formTitle').textContent = '新增观影记录';
            document.getElementById('movieForm').reset();
            document.getElementById('movieId').value = '';
            document.getElementById('archiveDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.body.style.overflow = '';
            editingId = null; // 确保关闭时重置编辑状态
        }

        async function editMovie(id) {
            closeModal();
            // 确保 ID 类型一致
            const movie = movies.find(m => String(m.id) === String(id));
            if (!movie) {
                // 如果在当前列表中找不到，尝试从 API 获取
                const single = await apiGet(`${API_BASE}/movies/${id}`);
                if (single.success && single.data) {
                    const movieData = single.data;
                    editingId = id; 
                    document.getElementById('formTitle').textContent = '编辑观影记录';
                    document.getElementById('movieId').value = id;
                    document.getElementById('title').value = movieData.title;
                    document.getElementById('altTitle').value = movieData.altTitle || '';
                    document.getElementById('year').value = movieData.year || '';
                    document.getElementById('country').value = movieData.country || '';
                    document.getElementById('type').value = movieData.type;
                    document.getElementById('rating').value = movieData.rating ? Math.round(Number(movieData.rating)) : '';
                    document.getElementById('platform').value = movieData.platform;
                    document.getElementById('category').value = movieData.category || '';
                    document.getElementById('tmdbUrl').value = movieData.tmdbUrl || '';
                    document.getElementById('archiveDate').value = (movieData.archiveDate || '').replace(/\//g, '-');
                    document.getElementById('poster').value = movieData.poster || '';
                    document.getElementById('notes').value = movieData.notes || '';
                    document.getElementById('addModal').classList.add('active');
                    document.body.style.overflow = 'hidden';
                } else {
                    showNotification('找不到该电影信息', 'error');
                }
                return;
            }
            editingId = id; 
            document.getElementById('formTitle').textContent = '编辑观影记录';
            document.getElementById('movieId').value = id;
            document.getElementById('title').value = movie.title;
            document.getElementById('altTitle').value = movie.altTitle || '';
            document.getElementById('year').value = movie.year || '';
            document.getElementById('country').value = movie.country || '';
            document.getElementById('type').value = movie.type;
            document.getElementById('rating').value = movie.rating ? Math.round(Number(movie.rating)) : '';
            document.getElementById('platform').value = movie.platform;
            document.getElementById('category').value = movie.category || '';
            document.getElementById('tmdbUrl').value = movie.tmdbUrl || '';
            document.getElementById('archiveDate').value = (movie.archiveDate || '').replace(/\//g, '-');
            document.getElementById('poster').value = movie.poster || '';
            document.getElementById('notes').value = movie.notes || '';
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function deleteMovie(id) {
            if (!confirm('确定要删除这条观影记录吗？')) return;
            // 确保 ID 类型一致
            const movie = movies.find(m => String(m.id) === String(id));
            if (!movie) {
                showNotification('找不到该电影信息', 'error');
                return;
            }
            const data = await apiFetch(`${API_BASE}/movies/${id}`, { method: 'DELETE' });
            if (data.success) {
                await fetchMovies(); fetchStats(); applyFilters(); closeModal();
                showNotification(`已删除《${movie.title}》`, 'success');
            } else { showNotification('删除失败', 'error'); }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const type = document.getElementById('type').value;
            const rating = parseFloat(document.getElementById('rating').value);
            const platform = document.getElementById('platform').value;
            const archiveDate = document.getElementById('archiveDate').value;
            if (!title || !type || !rating || !platform || !archiveDate) { showNotification('请填写必填项', 'error'); return; }
            const movieData = {
                title, altTitle: document.getElementById('altTitle').value.trim(),
                year: document.getElementById('year').value ? parseInt(document.getElementById('year').value) : 0,
                country: document.getElementById('country').value.trim(), type,
                category: document.getElementById('category').value.trim(),
                rating, platform, tmdbUrl: document.getElementById('tmdbUrl').value.trim(),
                archiveDate, poster: document.getElementById('poster').value.trim(),
                notes: document.getElementById('notes').value.trim()
            };
            try {
                let res;
                console.log('editingId:', editingId);
                console.log('API_BASE:', API_BASE);
                if (editingId) {
                    console.log('PUT URL:', `${API_BASE}/movies/${editingId}`);
                    res = await apiFetch(`${API_BASE}/movies/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(movieData) });
                } else {
                    console.log('POST URL:', `${API_BASE}/movies`);
                    res = await apiFetch(`${API_BASE}/movies`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(movieData) });
                }
                console.log('API Response:', res);
                if (res.success) {
                    await fetchMovies(); fetchStats(); applyFilters(); closeAddModal();
                    showNotification(res.message, 'success');
                } else { showNotification(res.message || '操作失败', 'error'); }
            } catch (e) { 
                console.error('Submit Error:', e);
                showNotification('网络错误', 'error'); 
            }
        }

        function showNotification(msg, type) {
            const n = document.getElementById('notification');
            n.textContent = msg; n.className = 'notification show ' + (type || '');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        function showLoading(hint) {
            document.getElementById('loadingHint').textContent = hint || '正在获取信息...';
            document.getElementById('loadingDialog').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingDialog').classList.remove('show');
        }

        async function startBatchFill() {
            const btn = document.getElementById('batchFillBtn');
            btn.disabled = true;
            btn.textContent = '填充中...';

            const dialog = document.getElementById('batchProgressDialog');
            document.getElementById('batchProgressFill').style.width = '0%';
            document.getElementById('batchProgressStats').textContent = '';
            document.getElementById('batchProgressHint').textContent = '正在查询需要填充的数据...';
            dialog.classList.add('show');

            try {
                const resp = await apiFetch(`${API_BASE}/movies/batch-fill`, { method: 'POST', timeout: 600000 });
                if (resp.success && resp.data) {
                    const d = resp.data;
                    const total = d.total;

                    if (total === 0) {
                        document.getElementById('batchSpinner').style.display = 'none';
                        document.getElementById('batchProgressHint').textContent = '没有需要填充的数据';
                        document.getElementById('batchProgressStats').textContent = '所有记录都已完整';
                        setTimeout(() => dialog.classList.remove('show'), 2000);
                        return;
                    }

                    // Poll for final result (the endpoint processes and returns final)
                    document.getElementById('batchProgressHint').textContent = `正在处理 ${total} 条记录...`;
                    document.getElementById('batchProgressFill').style.width = '100%';
                    document.getElementById('batchProgressStats').textContent = `已完成: ${d.filled} | 未找到: ${d.failed} | 共 ${d.total}`;
                    document.getElementById('batchSpinner').style.display = 'none';
                    document.getElementById('batchProgressHint').textContent = d.done ? '批量填充完成!' : '处理中...';

                    setTimeout(() => {
                        dialog.classList.remove('show');
                        document.getElementById('batchSpinner').style.display = '';
                        fetchMovies();
                    }, d.done ? 2000 : 5000);
                }
            } catch (e) {
                document.getElementById('batchProgressHint').textContent = '批量填充失败';
                document.getElementById('batchProgressStats').textContent = e.message || '请求异常';
            } finally {
                btn.disabled = false;
                btn.textContent = '批量填充';
            }
        }

        function setupSearchSuggestions() {
            const input = document.getElementById('title');
            const div = document.getElementById('searchSuggestions');
            if (!input || !div) return;
            let lastSeq = 0;
            let lastSearchQuery = '';
            input.addEventListener('input', e => {
                clearTimeout(searchTimeout);
                const q = e.target.value.trim();
                lastSearchQuery = q;
                if (q.length < 2) { div.classList.remove('show'); return; }
                const seq = ++lastSeq;
                searchTimeout = setTimeout(() => {
                    apiGet(`${API_BASE}/douban/search?q=${encodeURIComponent(q)}`).then(resp => {
                        if (seq !== lastSeq) return;
                        if (resp.success && resp.data && resp.data.length > 0) {
                            div.innerHTML = resp.data.map(m => {
                                const cover = (m.cover && (m.cover.includes('doubanio.com') || m.cover.includes('douban.com')))
                                    ? `/api/proxy/image?url=${encodeURIComponent(m.cover)}` : ((m.cover && m.cover !== '_not_found_') ? m.cover : '');
                                return `
                        <div class="suggestion-item" onclick="selectMovie(${m.id},'${m.title.replace(/'/g, "\\'")}','${m.media_type||''}')">
                            <img class="suggestion-poster" src="${cover}" alt=""
                                onerror="this.style.display='none'">
                            <div class="suggestion-info">
                                <div class="suggestion-title">${m.title}</div>
                                <div class="suggestion-meta">
                                    ${m.year||''}
                                    ${m.rating ? '<span class="suggestion-rating">★ '+m.rating+'</span>' : ''}
                                    ${m.country ? '<span class="sep">·</span>'+m.country : ''}
                                </div>
                            </div>
                        </div>
                    `; }).join('');
                            div.classList.add('show');
                        } else {
                            div.innerHTML = '<div class="suggestion-item" style="color:var(--text-secondary)">未找到相关结果</div>';
                            div.classList.add('show');
                        }
                    }).catch(() => { if (seq === lastSeq) div.classList.remove('show'); });
                }, 300);
            });
            document.addEventListener('click', e => { if (!input.contains(e.target) && !div.contains(e.target)) div.classList.remove('show'); });

            // Make lastSearchQuery available in selectMovie
            window._lastSearchQuery = () => lastSearchQuery;
        }

        async function selectMovie(id, title, mediaType) {
            document.getElementById('searchSuggestions').classList.remove('show');
            showLoading('正在获取影片详情...');
            try {
                const originalTitle = window._lastSearchQuery ? window._lastSearchQuery() : title;
                document.getElementById('title').value = originalTitle;

                const tmdbResp = await apiFetch(`${API_BASE}/tmdb/detail`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: originalTitle, tmdb_id: id, media_type: mediaType }),
                });

                if (tmdbResp.success && tmdbResp.data) {
                    const d = tmdbResp.data;
                    document.getElementById('altTitle').value = d.altTitle || '';
                    document.getElementById('year').value = d.year || '';
                    document.getElementById('country').value = d.countries || '';
                    document.getElementById('poster').value = d.poster || '';
                    if (d.genres && d.genres.length > 0) document.getElementById('category').value = d.genres.join(', ');
                    if (!editingId && d.rating) document.getElementById('rating').value = d.rating;
                    if (d.tmdbUrl) document.getElementById('tmdbUrl').value = d.tmdbUrl;
                }

                showNotification('已从 TMDB 获取信息', 'success');
            } catch {
                showNotification('获取详情失败', 'error');
            } finally {
                hideLoading();
            }
        }

        function setupEventListeners() {
            document.getElementById('searchToggle').addEventListener('click', () => {
                filterOpen = !filterOpen;
                document.getElementById('filterPanel').classList.toggle('open');
                document.getElementById('searchToggle').classList.toggle('active');
                if (filterOpen) document.getElementById('searchInput').focus();
            });

            document.getElementById('searchInput').addEventListener('input', e => { filters.search = e.target.value; applyFilters(); });
            document.querySelectorAll('#typeFilter .chip').forEach(c => c.addEventListener('click', () => {
                const allChip = document.querySelector('#typeFilter .chip[data-value="all"]');
                if (c.dataset.value === 'all') {
                    document.querySelectorAll('#typeFilter .chip').forEach(x => x.classList.remove('active'));
                    allChip.classList.add('active');
                    filters.type = [];
                } else {
                    allChip.classList.remove('active');
                    if (c.classList.contains('active')) {
                        c.classList.remove('active');
                        filters.type = filters.type.filter(v => v !== c.dataset.value);
                    } else {
                        c.classList.add('active');
                        filters.type.push(c.dataset.value);
                    }
                    if (filters.type.length === 0) {
                        allChip.classList.add('active');
                    }
                }
                applyFilters();
            }));
            document.querySelectorAll('#platformFilter .chip').forEach(c => c.addEventListener('click', () => {
                const allChip = document.querySelector('#platformFilter .chip[data-value="all"]');
                if (c.dataset.value === 'all') {
                    document.querySelectorAll('#platformFilter .chip').forEach(x => x.classList.remove('active'));
                    allChip.classList.add('active');
                    filters.platform = [];
                } else {
                    allChip.classList.remove('active');
                    if (c.classList.contains('active')) {
                        c.classList.remove('active');
                        filters.platform = filters.platform.filter(v => v !== c.dataset.value);
                    } else {
                        c.classList.add('active');
                        filters.platform.push(c.dataset.value);
                    }
                    if (filters.platform.length === 0) {
                        allChip.classList.add('active');
                    }
                }
                applyFilters();
            }));
            document.getElementById('sortSelect').addEventListener('change', () => applyFilters());
            document.getElementById('resetBtn').addEventListener('click', () => {
                filters = { search: '', type: [], year: [], platform: [], country: [] };
                document.getElementById('searchInput').value = '';
                document.querySelectorAll('.chip').forEach(c => { c.classList.remove('active'); if (c.dataset.value === 'all') c.classList.add('active'); });
                document.getElementById('sortSelect').value = 'dateDesc';
                applyFilters();
            });

            document.addEventListener('click', e => {
                const filterPanel = document.getElementById('filterPanel');
                const searchToggle = document.getElementById('searchToggle');
                
                // 只有筛选框点击外部关闭，详情框和编辑框不受影响
                if (filterOpen && !filterPanel.contains(e.target) && !searchToggle.contains(e.target)) {
                    filterOpen = false;
                    filterPanel.classList.remove('open');
                    searchToggle.classList.remove('active');
                }
            });
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('movieForm').addEventListener('submit', handleFormSubmit);
            document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeAddModal(); } });

            setupSearchSuggestions();
        }

        async function init() {
            document.getElementById('movieGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p style="color:var(--text-secondary)">正在加载数据...</p></div>';
            setupEventListeners();
            await applyFilters();
            fetchStats();
            fetchCountries();
            loadNetworkInfo();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
