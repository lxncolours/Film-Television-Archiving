<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度总结 - 观影记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #000;
            --surface: #111;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #f0f0f0;
            --text-secondary: #666;
            --accent: #e94560;
            --accent-dim: rgba(233, 69, 96, 0.15);
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 500;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .top-bar-left { display: flex; align-items: center; gap: 1.5rem; }
        .top-bar-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--text);
            cursor: default;
        }
        .top-bar-back {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
        }
        .top-bar-back:hover {
            border-color: var(--text);
            color: var(--text);
        }
        .top-bar-year-nav {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .year-nav-btn {
            padding: 0.35rem 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .year-nav-btn:hover { border-color: var(--text); color: var(--text); }
        .year-nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .main-content {
            padding: 80px 2rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            padding: 1rem 1.2rem;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .stat-card .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-card .stat-value.accent { color: var(--accent); }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }
        .platform-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 0.8rem 1.2rem;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .platform-stats .plat-item {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .platform-stats .plat-item strong {
            color: var(--text);
            font-weight: 500;
        }

        /* Compact Poster Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
        }
        .movie-card {
            position: relative;
            cursor: pointer;
            background: var(--surface);
            overflow: hidden;
            opacity: 0;
            transform: translateY(12px);
            animation: cardIn 0.35s ease forwards;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card .poster-wrap {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
            background: var(--surface);
        }
        .movie-card .poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .movie-card:hover .poster-wrap img { transform: scale(1.08); }
        .movie-card .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface);
        }
        .movie-card .poster-placeholder .initial {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgba(233, 69, 96, 0.2);
        }
        .movie-card .rating-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--accent);
            color: white;
            padding: 0.15rem 0.45rem;
            font-size: 0.65rem;
            font-weight: 600;
            z-index: 2;
            letter-spacing: 0.05em;
        }
        .movie-card .card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 1.2rem 0.5rem 0.4rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.92));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }
        .movie-card:hover .card-overlay { opacity: 1; }
        .card-overlay .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-overlay .card-meta {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.1rem;
        }
        .type-tag {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.15rem 0.4rem;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            z-index: 2;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.8rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .notification.show { opacity: 1; transform: translateY(0); }
        .notification.success { border-color: #10b981; color: #10b981; }
        .notification.error { border-color: #ef4444; color: #ef4444; }

        @media (max-width: 900px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .top-bar { padding: 0 1rem; }
            .main-content { padding: 76px 1rem 1rem; }
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 0.3rem; }
            .top-bar-year-nav { display: none; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="top-bar-left">
            <a href="/" class="top-bar-back">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                返回
            </a>
            <div class="top-bar-title">年度总结</div>
        </div>
        <div class="top-bar-year-nav" id="yearNav"></div>
    </header>

    <main class="main-content">
        <div class="stats-cards" id="statsCards">
            <div class="stat-card"><div class="stat-value accent" id="statTotal">-</div><div class="stat-label">总观影</div></div>
            <div class="stat-card"><div class="stat-value" id="statAvg">-</div><div class="stat-label">平均评分</div></div>
            <div class="stat-card"><div class="stat-value" id="statMovies">-</div><div class="stat-label">电影</div></div>
            <div class="stat-card"><div class="stat-value" id="statSeries">-</div><div class="stat-label">剧集</div></div>
        </div>
        <div class="platform-stats" id="platformStats"></div>
        <div class="movie-grid" id="movieGrid">
            <div class="empty-state"><p style="color:var(--text-secondary)">加载中...</p></div>
        </div>
    </main>

    <div class="notification" id="notification"></div>

    <script>
        const API_BASE = `${window.location.origin}/api`;
        let currentYear = null;
        let availableYears = [];

        // XSS prevention: escape all user-controlled data before inserting into innerHTML
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;');
        }

        function showNotification(msg, type) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.className = 'notification show ' + (type || '');
            setTimeout(() => n.classList.remove('show'), 2000);
        }

        function proxyImg(movie) {
            if (!movie) return '';
            if (movie.has_poster_data) return `/api/movies/poster/${movie.id}/image`;
            if (!movie.poster || movie.poster === '_not_found_') return '';
            if (movie.poster.includes('doubanio.com') || movie.poster.includes('douban.com')) {
                return `/api/proxy/image?url=${encodeURIComponent(movie.poster)}`;
            }
            return movie.poster;
        }

        async function apiGet(url) {
            try {
                const cacheBuster = url.includes('?') ? '&_t=' : '?_t=';
                const res = await fetch(url + cacheBuster + Date.now(), { cache: 'no-store' });
                if (res.ok) return await res.json();
            } catch { }
            return { success: false };
        }

        async function loadYears() {
            const d = await apiGet(`${API_BASE}/movies/stats`);
            if (d.success && d.data && d.data.years) {
                availableYears = d.data.years.map(y => y.year);
                const nav = document.getElementById('yearNav');
                nav.innerHTML = availableYears.map(y =>
                    `<button class="year-nav-btn" data-year="${escapeHtml(y)}">${escapeHtml(y)}</button>`
                ).join('');
                nav.querySelectorAll('.year-nav-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        nav.querySelectorAll('.year-nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        loadYear(btn.dataset.year);
                    });
                });
                if (availableYears.length > 0) {
                    const first = nav.querySelector('.year-nav-btn');
                    first.classList.add('active');
                    loadYear(availableYears[0]);
                }
            }
        }

        async function loadYear(year) {
            currentYear = year;
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '<div class="empty-state"><p style="color:var(--text-secondary)">加载中...</p></div>';

            const d = await apiGet(`${API_BASE}/movies/annual/${year}`);
            if (!d.success || !d.data) {
                grid.innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
                return;
            }

            const data = d.data;

            document.getElementById('statTotal').textContent = data.total;
            document.getElementById('statAvg').textContent = data.avgRating;
            document.getElementById('statMovies').textContent = data.movieCount;
            document.getElementById('statSeries').textContent = data.seriesCount;

            const platEl = document.getElementById('platformStats');
            if (data.platforms && data.platforms.length > 0) {
                platEl.innerHTML = data.platforms.map(p =>
                    `<span class="plat-item">${escapeHtml(p.platform)}: <strong>${escapeHtml(p.count)}</strong></span>`
                ).join('');
            } else {
                platEl.innerHTML = '';
            }

            if (data.movies.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>该年份暂无记录</p></div>';
                return;
            }

            grid.innerHTML = data.movies.map((movie, i) => {
                const safeTitle = escapeHtml(movie.title);
                const safeInitial = escapeHtml((movie.title || '?')[0] || '?');
                const safeType = escapeHtml(movie.type || '未知');
                const safePlatform = escapeHtml(movie.platform || '');
                return `
                <div class="movie-card" style="animation-delay:${i*0.02}s">
                    <div class="poster-wrap">
                        ${(movie.has_poster_data || movie.poster) ? `
                            <img src="${proxyImg(movie)}" alt="${safeTitle}" loading="lazy"
                                onerror="this.outerHTML=\`<div class='poster-placeholder'><span class='initial'>${safeInitial}</span></div>\`">
                        ` : `
                            <div class="poster-placeholder">
                                <span class="initial">${safeInitial}</span>
                            </div>
                        `}
                        <span class="rating-badge">${Number(movie.rating||0).toFixed(1)}</span>
                        <span class="type-tag">${safeType}</span>
                        <div class="card-overlay">
                            <div class="card-title">${safeTitle}</div>
                            <div class="card-meta">${safePlatform}</div>
                        </div>
                    </div>
                </div>
            `;}).join('');
        }

        document.addEventListener('DOMContentLoaded', loadYears);
    </script>
</body>
</html>
