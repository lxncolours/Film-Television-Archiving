services:
  mysql:
    image: mysql:8.0
    container_name: movie-archive-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: movie_archive
    ports:
      - "3307:3306"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: movie-archive-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6380:6379"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  app:
    image: liberica/film-television-archiving:latest
    container_name: movie-archive-app
    restart: unless-stopped
    ports:
      - "5280:5280"
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      DB_NAME: movie_archive
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "5280"
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
